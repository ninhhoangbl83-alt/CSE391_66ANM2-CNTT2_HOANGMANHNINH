<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đăng Ký Tài Khoản</title>
<link rel="stylesheet" href="./assets/Bai2_1.css">
</head>

<body>

<div class="container">

<h2>Form Đăng Ký</h2>

<form id="registerForm">

<!-- HỌ TÊN -->
<div class="form-group">
<label>Họ và tên</label>

<div class="input-box">
<input type="text" id="fullname" maxlength="50">
<div id="nameCount">0/50</div>
<small class="error" id="fullnameError"></small>
</div>

</div>


<!-- EMAIL -->
<div class="form-group">
<label>Email</label>

<div class="input-box">
<input type="text" id="email">
<small class="error" id="emailError"></small>
</div>

</div>


<!-- PHONE -->
<div class="form-group">
<label>Số điện thoại</label>

<div class="input-box">
<input type="text" id="phone">
<small class="error" id="phoneError"></small>
</div>

</div>


<!-- PASSWORD -->
<div class="form-group">
<label>Mật khẩu</label>

<div class="input-box">

<div class="password-box">
<input type="password" id="password">
<span id="togglePassword">👁</span>
</div>

<div id="strengthBar"></div>
<div id="strengthText"></div>

<small class="error" id="passwordError"></small>

</div>

</div>


<!-- CONFIRM PASSWORD -->
<div class="form-group">
<label>Xác nhận mật khẩu</label>

<div class="input-box">
<input type="password" id="confirmPassword">
<small class="error" id="confirmPasswordError"></small>
</div>

</div>


<!-- GENDER -->
<div class="form-group">
<label>Giới tính</label>

<div class="input-box">

<div class="gender-options">
<label><input type="radio" name="gender" value="Nam"> Nam</label>
<label><input type="radio" name="gender" value="Nữ"> Nữ</label>
</div>

<small class="error" id="genderError"></small>

</div>
</div>


<!-- TERMS -->
<div class="form-group">
<label></label>

<div class="input-box">
<label class="checkbox-label">
<input type="checkbox" id="terms">
Tôi đồng ý điều khoản
</label>

<small class="error" id="termsError"></small>
</div>

</div>


<!-- BUTTON -->
<div class="form-group">
<label></label>
<button type="submit">Đăng ký</button>
</div>

</form>

<h3 id="successMessage"></h3>

</div>

<script src="./assets/Bai2_1.js"></script>

</body>
</html>
