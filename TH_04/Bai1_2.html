<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Bộ Lọc & Tìm Kiếm Danh Sách</title>
<link rel="stylesheet" href="./assets/Bai1_2.css">
</head>

<body>

<h2>Quản Lý Điểm Sinh Viên</h2>

<!-- FORM THÊM SINH VIÊN -->
<div class="form">
    <input type="text" id="name" placeholder="Họ tên">
    <input type="number" id="score" placeholder="Điểm (0-10)" min="0" max="10">
    <button id="addBtn">Thêm</button>
</div>

<!-- TÌM KIẾM -->
<input type="text" id="searchInput" placeholder="Tìm kiếm tên sinh viên">

<!-- LỌC -->
<select id="filterRank">
<option value="all">Tất cả</option>
<option value="Giỏi">Giỏi</option>
<option value="Khá">Khá</option>
<option value="Trung bình">Trung bình</option>
<option value="Yếu">Yếu</option>
</select>

<br><br>

<table border="1">

<thead>
<tr>
<th>STT</th>
<th>Họ tên</th>
<th id="sortScore">Điểm</th>
<th>Xếp loại</th>
<th>Thao tác</th>
</tr>
</thead>

<tbody id="tableBody">
</tbody>

</table>

<p id="stats"></p>

<script src="./assets/Bai1_2.js"></script>

</body>
</html>
